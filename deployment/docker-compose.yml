services:
  postgres:
    image: postgres:16-alpine
    volumes:
      - pg_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: tig
      POSTGRES_PASSWORD: tig
      POSTGRES_DB: tig
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tig"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
      target: api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://tig:tig@postgres:5432/tig
      TIG_ENCRYPTION_KEY: "${TIG_ENCRYPTION_KEY:-change-me-in-production-32chars!}"
      BETTER_AUTH_URL: "http://localhost:3000"
      PORT: "3000"
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
      target: worker
    volumes:
      - ${HOME}/.aws:/root/.aws:ro
    environment:
      DATABASE_URL: postgres://tig:tig@postgres:5432/tig
      TIG_ENCRYPTION_KEY: "${TIG_ENCRYPTION_KEY:-change-me-in-production-32chars!}"
      AWS_REGION: "${AWS_REGION:-us-east-1}"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
      target: frontend
    ports:
      - "8090:80"
    depends_on:
      - api

volumes:
  pg_data:
