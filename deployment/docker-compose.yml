services:
  postgres:
    image: postgres:16-alpine
    volumes:
      - pg_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: tig
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: tig
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tig"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
      target: api
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgres://tig:${POSTGRES_PASSWORD}@postgres:5432/tig"
      TIG_ENCRYPTION_KEY: "${TIG_ENCRYPTION_KEY}"
      BETTER_AUTH_URL: "http://localhost:3000"
      PORT: "3000"
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
      target: worker
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgres://tig:${POSTGRES_PASSWORD}@postgres:5432/tig"
      TIG_ENCRYPTION_KEY: "${TIG_ENCRYPTION_KEY}"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
      target: frontend
    ports:
      - "8090:80"
    depends_on:
      - api

volumes:
  pg_data:
